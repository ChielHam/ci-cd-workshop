#############################################
# Level 1 — Yoshi's Island (SOLUTION)
#
# Bouwt de app met Gradle bij handmatig starten.
# Tip: Vervang de trigger door push/pull_request om 'm automatisch te laten lopen.
#############################################
name: Level 1 - Yoshi's Island (Solution)

on:
  workflow_dispatch: {}
  # Voor productiegebruik kun je dit overwegen:
  # push:
  #   branches: [ "**" ]
  # pull_request:
  #   branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build
