name: Level 4 - Toad's Treasure House

on:
  workflow_dispatch:
    inputs:
      jar-name:
        description: 'Jar file name'
        required: true
        default: 'toads-treasure-house'

jobs:
  artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: 'gradle'
      - name: Build jar
        run: ./gradlew jar
        env:
          JAR_NAME: ${{ inputs.jar-name }}
      - name: Upload jar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: build/libs/*.jar