name: Level 5 - Bowser's Castle

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: 'gradle'
      - name: Build jar
        run: |
          ./gradlew jar
          cp build/libs/*.jar docker/
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: |
          cd docker
          docker build \
            -t my-app:${{ github.sha }} \
            -t my-app:latest \
            .
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          push: true
          # NOTE should be ${{ github.repository_owner }} rather than "chielham"
          tags: |
            ghcr.io/chielham/my-app:latest
            ghcr.io/chielham/my-app:${{ github.sha }}