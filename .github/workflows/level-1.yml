#############################################
# Level 1 — Yoshi's Island (STUB)
#
# Doel (verhaal):
#  Verbind het Mushroom Kingdom met Yoshi's Island.
#
# Daadwerkelijk leerdoel:
# - Een workflow kunnen starten
# - De code kunnen builden met Gradle
#
# Instructie:
# - Deze stub draait alleen met "Run workflow" (workflow_dispatch)
# - Vervang dit later door een echte trigger (push / pull_request)
#############################################
name: Level 1 - Yoshi's Island

on:
  workflow_dispatch: {}
  # TODO: vervang bovenstaande door bijvoorbeeld:
  # push:
  #   branches: [ "**" ]
  # pull_request:
  #   branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code (Mario springt in een groene pijp)
        uses: actions/checkout@v4

      - name: Setup Java 21
        # TODO: configureer de juiste action en opties
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin # hint

      - name: Setup Gradle (Toad levert gereedschap)
        # TODO: kies een geschikte Gradle action
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle (Build the castle)
        # TODO: kies een geschikte Gradle taak, bv. 'build'
        run: ./gradlew build